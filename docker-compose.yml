services:
  db:
    build:
      context: ./infra/postgres
    environment:
      POSTGRES_DB: cityflaneur
      POSTGRES_USER: cityflaneur
      POSTGRES_PASSWORD: cityflaneur
    ports:
      - "5432:5432"
    volumes:
      - cityflaneur-postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cityflaneur -d cityflaneur"]
      interval: 5s
      timeout: 5s
      retries: 12

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 12

  api:
    build:
      context: ./apps/api
    environment:
      DATABASE_URL: postgresql+psycopg://cityflaneur:cityflaneur@db:5432/cityflaneur
      REDIS_URL: redis://redis:6379/0
      CORS_ORIGINS: http://localhost:3000,http://127.0.0.1:3000
    ports:
      - "8000:8000"
    volumes:
      - ./apps/api:/app
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  web:
    build:
      context: ./apps/web
    environment:
      NEXT_PUBLIC_API_URL: http://127.0.0.1:8000
    ports:
      - "3000:3000"
    volumes:
      - ./apps/web:/app
      - /app/node_modules
      - /app/.next
    depends_on:
      - api

volumes:
  cityflaneur-postgres:

